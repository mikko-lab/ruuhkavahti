services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: ruuhkavahti-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # KRaft vaatii base64-koodatun 16-tavuisen UUID:n tarkalleen (22 merkkiä,
      # ei mielivaltainen merkkijono) — generoitu: base64.urlsafe_b64encode(uuid4().bytes)
      CLUSTER_ID: "XgIH6mGKQQ6HpOStMWi_2w"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Ei-pysyvä palvelu: luo topicit oikeilla partitiomäärillä ja sammuu.
  # viewer-messages = 4 partitiota (ks. README "Partitio ja partition key").
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command: >
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic viewer-messages --partitions 4 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic approved-messages --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic escalated-messages --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic blocked-messages --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic rebalance-events --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic duplicate-events --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  producer:
    build: ./producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      MODE: baseline

  guardrail-consumer:
    build: ./guardrail
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      # "cooperative-sticky" (KIP-429, oletus) tai "range" (klassinen eager) —
      # vaihto vaatii kontin uudelleenkäynnistyksen, ks. README "Rebalance-strategiat".
      ASSIGNMENT_STRATEGY: ${ASSIGNMENT_STRATEGY:-cooperative-sticky}

  dashboard-backend:
    build: ./dashboard/backend
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092

  dashboard-frontend:
    build: ./dashboard/frontend
    ports:
      - "5173:5173"
    depends_on:
      - dashboard-backend
